name: Analyze Video Colors

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      n_colors:
        description: 'Number of colors to extract'
        required: false
        default: '12'
        type: string

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yt-dlp Pillow
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Checkout scripts from main
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/

      - name: Run analysis
        run: |
          mkdir -p results
          python scripts/analyze.py "${{ github.event.inputs.youtube_url }}" "${{ github.event.inputs.n_colors }}" > result.json
          VIDEO_ID=$(python -c "import json; print(json.load(open('result.json'))['video_id'])")
          cp result.json "results/${VIDEO_ID}.json"

          # Update index
          python -c "
          import json, glob, os
          items = []
          for f in sorted(glob.glob('results/*.json'), key=os.path.getmtime, reverse=True):
              with open(f) as fh:
                  d = json.load(fh)
                  items.append({'video_id': d['video_id'], 'title': d['title'], 'url': d['url'], 'analyzed_at': d['analyzed_at'], 'top_color': d['colors'][0]['hex'] if d['colors'] else '#000'})
          with open('results/index.json', 'w') as fh:
              json.dump(items, fh, ensure_ascii=False, indent=2)
          "

      - name: Commit and push results
        run: |
          rm -rf scripts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "Add color analysis for ${{ github.event.inputs.youtube_url }}"
          git push origin gh-pages
